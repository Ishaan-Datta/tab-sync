output: false

pre-commit:
  parallel: true
  jobs:
    - name: format extension
      root: extension
      run: bun run fmt
      stage_fixed: true

    - name: format server
      root: server
      run: cargo fmt --all
      stage_fixed: true

    - name: lint extension
      root: extension
      run: bun run lint
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: check format extension
      root: extension
      run: bun run fmt:check
      fail_text: "Format check failed, run `bun run fmt`"

    - name: check format server
      root: server
      run: cargo fmt --check
      fail_text: "Format check failed, run `cargo fmt --all`"

    - name: check lint extnsion
      root: extension
      run: bun run lint:check
      fail_text: "Lint check failed, run `bun run lint`"

    - name: check types
      root: extension
      run: bun run check
      fail_text: "Type check failed, run `bun run check`"

    - name: check build
      root: extension
      run: bun run build
      fail_text: "Build failed, run `bun run build`"
